version: 2
updates:
  #
  # main branch
  #
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  #
  # 5.0.x maintenance branch
  #
  - package-ecosystem: npm
    target-branch: 5.0.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
  - package-ecosystem: docker
    target-branch: 5.0.x
    directory: /docker
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    target-branch: 5.0.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  #
  # 4.14.x maintenance branch
  #
  - package-ecosystem: npm
    target-branch: 4.14.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
  - package-ecosystem: docker
    target-branch: 4.14.x
    directory: /docker
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    target-branch: 4.14.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
