name: i18n
on:
  push:
    branches:
      - '4.14.x' # Release branch
      - 'feature-**' # Feature branches
  pull_request:
    branches:
      - '4.14.x' # Release branch
      - 'feature-**' # Feature branches

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false

      - name: Set up NodeJs
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # tag=v7.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check for Translations
        run: |
          mv src/assets/scss/vendors/chart.js src/assets/scss/vendors/chart.js.skip
          npm run vue-i18n-extract
        continue-on-error: false
