name: i18n
on:
  push:
    branches:
      - '4.14.x' # Release branch
      - 'feature-**' # Feature branches
  pull_request:
    branches:
      - '4.14.x' # Release branch
      - 'feature-**' # Feature branches

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          persist-credentials: false

      - name: Set up NodeJs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check for Translations
        run: |
          mv src/assets/scss/vendors/chart.js src/assets/scss/vendors/chart.js.skip
          npm run vue-i18n-extract
        continue-on-error: false
