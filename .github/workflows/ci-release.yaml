name: Release CI

on:
  workflow_dispatch:
    inputs:
      release-version:
        required: false
        default: ''
        description: >-
          Release version (e.g. 5.7.0 or 5.7.0-rc.1).
          Leave empty to use version-bump-type instead.
        type: string
      version-bump-type:
        type: choice
        required: false
        description: >-
          Version bump type. Ignored if release-version is provided.
        default: ''
        options:
          - ''
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      preid:
        type: choice
        required: false
        description: >-
          Pre-release identifier.
          Only used with prepatch, preminor, premajor, or prerelease bump types.
        default: ''
        options:
          - ''
          - alpha
          - beta
          - rc
      dry-run:
        required: false
        default: false
        description: >-
          Perform a dry run without pushing changes or creating releases.
        type: boolean

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          token: ${{ secrets.BOT_RELEASE_GITHUB_TOKEN }}

      - name: Set up NodeJs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "dependencytrack-bot"
          git config user.email "106437498+dependencytrack-bot@users.noreply.github.com"

      - name: Bump Version
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
          VERSION_BUMP_TYPE: ${{ inputs.version-bump-type }}
          PREID: ${{ inputs.preid }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |-
          NPM_VERSION_OPTS='--tag-version-prefix='

          if [[ -n "${RELEASE_VERSION}" ]]; then
            npm version "${RELEASE_VERSION}" ${NPM_VERSION_OPTS} -m "prepare-release: set version to %s"
          elif [[ -n "${VERSION_BUMP_TYPE}" ]]; then
            NPM_VERSION_ARGS="${VERSION_BUMP_TYPE}"
            if [[ -n "${PREID}" ]]; then
              NPM_VERSION_ARGS="${NPM_VERSION_ARGS} --preid=${PREID}"
            fi
            npm version ${NPM_VERSION_ARGS} ${NPM_VERSION_OPTS} -m "prepare-release: set version to %s"
          else
            echo "Either release-version or version-bump-type must be provided"
            exit 1
          fi

          if [[ "${DRY_RUN}" != "true" ]]; then
            git push
            git push --tags
          fi

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_RELEASE_GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "Release version: ${VERSION}"

          PRERELEASE_FLAG=""
          if [[ "${VERSION}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            --draft \
            ${PRERELEASE_FLAG}
