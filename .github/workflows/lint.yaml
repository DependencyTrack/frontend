name: Lint
on:
  push:
    branches:
      - 'main' # Default branch
      - 'feature-**' # Feature branches
      - '[0-9]+.[0-9]+.x' # Release branches
  pull_request:
    branches:
      - 'main' # Default branch
      - 'feature-**' # Feature branches
      - '[0-9]+.[0-9]+.x' # Release branches

permissions: {}

jobs:
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Set up NodeJs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Lint Prettier
        run: npm run prettier
        continue-on-error: false
      - name: Lint ESLint
        run: npm run eslint
        continue-on-error: true

  lint-i18n:
    name: Lint i18n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Set up NodeJs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Check for Translations
        run: npm run vue-i18n-extract
        continue-on-error: false
