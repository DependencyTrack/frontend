name: Lint
on:
  push:
    branches:
      - 'main' # Default branch
      - 'feature-**' # Feature branches
      - '[0-9]+.[0-9]+.x' # Release branches
  pull_request:
    branches:
      - 'main' # Default branch
      - 'feature-**' # Feature branches
      - '[0-9]+.[0-9]+.x' # Release branches

permissions: {}

jobs:
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1
        with:
          persist-credentials: false
      - name: Set up NodeJs
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # tag=v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Lint Prettier
        run: npm run prettier
        continue-on-error: false
      - name: Lint ESLint
        run: npm run eslint
        continue-on-error: true

  lint-i18n:
    name: Lint i18n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1
        with:
          persist-credentials: false
      - name: Set up NodeJs
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # tag=v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Check for Translations
        run: npm run vue-i18n-extract
        continue-on-error: false
